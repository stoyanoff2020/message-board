# SonarCloud configuration for Message Board application

# Project identification
sonar.projectKey=message-board
sonar.organization=your-org
sonar.projectName=Message Board
sonar.projectVersion=0.1.0

# Source code configuration
sonar.sources=src
sonar.tests=src
sonar.test.inclusions=**/*.test.ts,**/*.test.tsx,**/*.spec.ts,**/*.spec.tsx
sonar.exclusions=**/node_modules/**,**/.next/**,**/coverage/**,**/dist/**,**/build/**

# Language configuration
sonar.javascript.lcov.reportPaths=coverage/lcov.info
sonar.typescript.lcov.reportPaths=coverage/lcov.info
sonar.eslint.reportPaths=eslint-results.sarif

# Coverage configuration
sonar.coverage.exclusions=**/*.test.ts,**/*.test.tsx,**/*.spec.ts,**/*.spec.tsx,**/test/**,**/__tests__/**

# Quality gate configuration
sonar.qualitygate.wait=true

# Additional settings
sonar.sourceEncoding=UTF-8